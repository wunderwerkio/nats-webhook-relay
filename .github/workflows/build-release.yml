name: Build Release

on:
  release:
    types:
      - prereleased
      - released

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  strip-version:
    name: Strip Version Prefix
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    outputs:
      version: ${{ steps.strip.outputs.version }}
    steps:
      - name: Strip v prefix
        id: strip
        run: echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

  build-arm64:
    name: Build ARM64
    needs: [strip-version]
    runs-on: blacksmith-16vcpu-ubuntu-2404-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish App Image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64
          file: Dockerfile
          tags: ghcr.io/wunderwerkio/nats-webhook-relay:arm64-${{ needs.strip-version.outputs.version }}
          push: true

  build-x86:
    name: Build X64
    needs: [strip-version]
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish App Image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          file: Dockerfile
          tags: ghcr.io/wunderwerkio/nats-webhook-relay:x64-${{ needs.strip-version.outputs.version }}
          push: true

  combine-images:
    name: Combine Images
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    needs: [strip-version, build-arm64, build-x86]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine images
        run: docker buildx imagetools create ghcr.io/wunderwerkio/nats-webhook-relay:x64-${{ needs.strip-version.outputs.version }} ghcr.io/wunderwerkio/nats-webhook-relay:arm64-${{ needs.strip-version.outputs.version }} --tag ghcr.io/wunderwerkio/nats-webhook-relay:${{ needs.strip-version.outputs.version }}

  publish-helm-chart:
    name: Publish Helm Chart
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    needs: [strip-version, combine-images]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and Push Chart
        run: |
          helm package helm/nats-webhook-relay \
            --app-version ${{ needs.strip-version.outputs.version }}
          helm push nats-webhook-relay-*.tgz oci://ghcr.io/wunderwerkio/charts
