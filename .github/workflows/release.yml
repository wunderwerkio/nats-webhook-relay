name: Release

on:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always
  BIN: nats-webhook-relay

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: blacksmith-16vcpu-ubuntu-2404
          - target: aarch64-unknown-linux-gnu
            os: blacksmith-16vcpu-ubuntu-2404-arm
          - target: aarch64-apple-darwin
            os: blacksmith-6vcpu-macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        run: cargo build --release

      - name: Package tarball
        run: |
          tar -C target/release -czf \
            "$BIN-${{ github.event.release.tag_name }}-${{ matrix.target }}.tar.gz" "$BIN"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.BIN }}-${{ github.event.release.tag_name }}-${{ matrix.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
