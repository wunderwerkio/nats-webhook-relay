name: Build Latest

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-arm64:
    name: Build ARM64
    runs-on: blacksmith-16vcpu-ubuntu-2404-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish App Image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64
          file: Dockerfile
          tags: ghcr.io/wunderwerkio/nats-webhook-relay:arm64
          push: true

  build-x86:
    name: Build X64
    runs-on: blacksmith-16vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish App Image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          file: Dockerfile
          tags: ghcr.io/wunderwerkio/nats-webhook-relay:x64
          push: true

  combine-images:
    name: Combine Images
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    needs: [build-arm64, build-x86]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine images
        run: docker buildx imagetools create ghcr.io/wunderwerkio/nats-webhook-relay:x64 ghcr.io/wunderwerkio/nats-webhook-relay:arm64 --tag ghcr.io/wunderwerkio/nats-webhook-relay:latest
